name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HF_HOME: ~/.cache/huggingface
      TRANSFORMERS_CACHE: ~/.cache/huggingface
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Build indexes fresh in CI (runner has no local state)
      - name: Build indexes for CI
        run: |
          mkdir -p data/raw
          cp -R datasets/ci_docs/* data/raw/ || true
          python3 scripts/ingest.py

      - name: Unit tests
        run: |
          pytest -q

      - name: Offline evaluation gate (retrieval-only)
        run: |
          python3 scripts/run_eval.py --mode retrieval --ci